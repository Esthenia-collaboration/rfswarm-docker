name: Collect DockerHub stats

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: stats

      - name: Fetch pulls & append to CSV
        run: |
          DATE=$(date -u +"%Y-%m-%d")
          BASE=$(curl -s https://hub.docker.com/v2/repositories/estheniacollaboration/rfswarm-agent-base/ | python3 -c "import sys,json; print(json.load(sys.stdin)['pull_count'])")
          SSH=$(curl -s https://hub.docker.com/v2/repositories/estheniacollaboration/rfswarm-agent-sshlibrary/ | python3 -c "import sys,json; print(json.load(sys.stdin)['pull_count'])")
          FIREFOX=$(curl -s https://hub.docker.com/v2/repositories/estheniacollaboration/rfswarm-agent-seleniumlibrary-firefox/ | python3 -c "import sys,json; print(json.load(sys.stdin)['pull_count'])")
          echo "$DATE,$BASE,$SSH,$FIREFOX" >> dockerhub-stats.csv

      - name: Commit & push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add dockerhub-stats.csv
          git commit -m "stats: $DATE base=$BASE ssh=$SSH firefox=$FIREFOX" || echo "No changes"
          git push origin stats
