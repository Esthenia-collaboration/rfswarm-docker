name: Standard any branch CI workflow
on:
  push:
    branches-ignore:
      - main
    paths:
      - 'agent/base/**'
      - 'agent/with-ssh/**'

# https://stackoverflow.com/questions/76661371/github-actions-build-docker-image-when-there-are-changes-in-folder
jobs:
  import-jobs:
    uses: ./.github/workflows/check_build_push_template.yml
    with:
      REGISTRY_URL: ghcr.io
      DOCKER_IMAGE_PREFIX: /esthenia-collaboration/rfswarm-
      DOCKER_IMAGE_TAG: ${{ github.ref_name }}
    secrets:
      REGISTRY_USERNAME: ${{ github.actor }}
      REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}